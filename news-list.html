<!DOCTYPE html>
<html lang="en">
<head>
<title>More News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:white;
}

/* HEADER */
.header{
    background:red;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    padding:10px;
}

/* NEWS CARD */
.news-item {
    display: flex;
    gap: 10px;
    padding: 12px;
    margin: 10px 0;
    background: #ff0000;
    border-radius: 8px;
    cursor: pointer;
}

.news-item img {
    width: 100px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
}

.news-text {
    flex: 1;
    display: flex;
    align-items: center;
}

.news-text h3 {
    font-size: 16px;
    color: white;
    margin: 0;
    line-height: 1.2;
}

/* LINE */
.news-line {
    height: 1px;
    background: #ddd;
    margin: 10px 20px;
}

/* BACK */
.back{
    padding:10px;
    color:red;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">More News</div>

<div class="back" onclick="goBack()">← Back</div>

<div class="container" id="newsContainer"></div>

<script>
function goBack(){
    window.history.back();
}

function openNews(id){
    window.location.href = "news.html?id=" + id;
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCXEwNI2pRGtT_68xhTU7c5McUdz2HL8",
    authDomain: "cpe--football.firebaseapp.com",
    projectId: "cpe--football",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadAllNews(){

    const container = document.getElementById("newsContainer");

    for(let i = 1; i <= 5; i++){

        const snap = await getDoc(doc(db, "homepageNews", String(i)));

        if(snap.exists()){
            const data = snap.data();

            container.innerHTML += `
                <div class="news-item" onclick="openNews(${i})">
                    <img src="${data.image}">
                    <div class="news-text">
                        <h3>${data.title}</h3>
                    </div>
                </div>

                <div class="news-line"></div>
            `;
        }
    }
}

loadAllNews();

</script>

</body>
</html>
