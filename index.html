<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding-top: 70px;
            font-family: 'Poppins', sans-serif;
            background-color: white;
        }

        /* BANNER */
        .banner {
            background: red;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .menu-icon {
            font-size: 40px;
            cursor: pointer;
            color: black;
        }

        .profile img {
            border-radius: 50%;
            object-fit: cover;
        }

        /* MENU */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            display: none;
            z-index: 3000;
        }

        .overlay.show {
            display: block;
        }

        .border-example {
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .line {
            border: 1px solid white;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            left: 15px;
            font-size: 20px;
            color: black;
            cursor: pointer;
        }

        .overlay-content {
            margin-top: 80px;
            padding-left: 20px;
        }

        .overlay-content a {
            display: block;
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            text-decoration: none;
        }

        .space {
            height: 25px;
        }

        /* MAIN POST */
        .image-post img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .post {
            background: red;
            padding: 15px;
        }

        .post-title {
            color: #FAA0A0;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.2;
        }

        .post-text {
            color: white;
            font-size: 30px;
            font-weight: bold;
            line-height: 1.0;
        }

        /* NEWS SECTION */
        .news-item {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            margin: 10px 0;
            cursor: pointer;
            background: #ff0000;
            border-radius: 8px;
            align-items: center;
        }

        .news-item img {
            width: 100px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
        }

        .news-text h3 {
            font-size: 16px;
            color: white;
            margin: 0;
            line-height: 1.0;
        }

        .news-line {
            height: 1px;
            background: #ddd;
            margin: 10px 20px;
        }

        /* FIXTURES */
        .fixture-box {
            background: #eee;
            margin: 15px;
            padding: 15px;
            border-radius: 8px;
        }

        .fixture-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .match {
            text-align: center;
            margin: 15px 0;
        }

        .match img {
            width: 60px;
        }

        .teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .score-box {
            background: red;
            color: white;
            padding: 10px;
            font-size: 20px;
            margin: 0 10px;
            border-radius: 100px;
        }

        /* FOOTER */
        footer {
            background: #F88379;
            color: white;
            padding: 30px 15px;
            font-family: 'Poppins', sans-serif;
        }

        footer img {
            margin-bottom: 20px;
        }

        footer .social-icons a {
            margin: 0 8px;
            color: white;
            font-size: 24px;
        }

        footer .lang-back {
            text-align: center;
            margin-bottom: 15px;
        }

        footer .copyright {
            text-align: center;
            font-size: 14px;
        }
        /* SKELETON LOADERS */
.skeleton {
    background: #ddd;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
}

.skeleton::after {
    content: "";
    position: absolute;
    top: 0;
    left: -150px;
    height: 100%;
    width: 150px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: loading 1.2s infinite;
}

@keyframes loading {
    0% {
        left: -150px;
    }
    50% {
        left: 100%;
    }
    100% {
        left: 100%;
    }
}
    </style>
</head>

<body>
    <!-- BANNER -->
    <div class="banner">
        <div class="menu-icon" onclick="toggleMenu()">&#8801;</div>
        <div>
            <img src="images/Logo.png" height="50" alt="Logo">
        </div>
        <div class="profile">
            <a href="account.html">
                <img src="images/Profile.jpg" width="50" height="50" alt="Profile">
            </a>
        </div>
    </div>

    <!-- MENU -->
    <div class="overlay" id="overlay">
        <div class="border-example">
            <img src="images/Logo.png" height="50" alt="Logo">
        </div>
        <div class="line"></div>
        <div class="close-btn" onclick="toggleMenu()">&#x2716;</div>
        <div class="overlay-content">
            <a href="news-list.html">NEWS</a>
            <a href="about.html">ABOUT</a>
            <a href="tv.html">CpeTV</a>
            <a href="team.html">TEAM</a>
            <a href="fixtures.html">FIXTURES & RESULTS</a>
            <a href="account.html">ACCOUNT</a>
            <a href="shop.html">SHOP</a>
            <a href="girls.html">GIRLS</a>
            <a href="album.html">SPORT ALBUM</a>
            <a href="predict.html">CPE PREDICT</a>
            <a href="join.html">JOIN</a>
            <a href="records.html">TEAM RECORDS</a>
        </div>
    </div>

    <div class="space"></div>

    <!-- MAIN POST -->
   <div id="imageContainer">
        <!-- Placeholder before image loads -->
        <div class="image-post" style="background:#ccc; height:200px;"></div>
    </div>
    <div id="postContainer">
        <div class="post" style="background:#ccc; height:100px;"></div>
    </div>

    <!-- NEWS SECTION -->
    <div style="padding:15px;">
        <h2 style="color:red;">Latest News</h2>
        <div id="newsContainer">
            <!-- Placeholder news -->
            <div class="news-item" style="background:#ccc; height:80px;"></div>
        </div>
    </div>
    <div style="text-align:center; margin:20px;">
        <a href="news-list.html" style="background:red; color:white; padding:10px 20px; text-decoration:none; border-radius:6px; font-weight:bold;">
            More News
        </a>
    </div>

    <div class="space"></div>

    <h2 style="padding-left:15px;">Fixtures & Results</h2>
    <div id="fixturesContainer">
        <!-- Placeholder fixtures -->
        <div class="fixture-box" style="height:150px; background:#ccc;"></div>
    </div>

    <!-- TOGGLE MENU SCRIPT -->
    <script>
        function toggleMenu() {
            const overlay = document.getElementById("overlay");
            overlay.classList.toggle("show");
        }
    </script>

    <!-- FIREBASE CONTENT LOADING -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXEwNI2pRGtT_68xhTU7c5McUdz2HL8",
            authDomain: "cpe--football.firebaseapp.com",
            projectId: "cpe--football",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // MAIN POST
        async function loadMainPost() {
            const snap = await getDoc(doc(db, "news", "main"));
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById("imageContainer").innerHTML =
                    `<div class="image-post"><img src="${data.image}" alt="Main Post"></div>`;
                document.getElementById("postContainer").innerHTML =
                    `<div class="post">
                        <div class="post-title">${data.title}</div>
                        <div class="post-text">${data.text}</div>
                    </div>`;
            }
        }

        // NEWS
        window.openNews = function(id) {
    window.location.href = "news.html?id=" + id;
};
        async function loadHomepageNews() {
    const container = document.getElementById("newsContainer");
    container.innerHTML = "";

    for (let i = 1; i <= 5; i++) {
        const snap = await getDoc(doc(db, "homepageNews", String(i)));
        if (snap.exists()) {
            const data = snap.data();
            container.innerHTML += `
                <div class="news-item" onclick="openNews(${i})">
                    <img src="${data.image}">
                    <div class="news-text">
                        <h3>${data.title}</h3>
                    </div>
                </div>
            `;
        }
    }
}

        // FIXTURES
        async function loadFixtures() {
            const container = document.getElementById("fixturesContainer");
            container.innerHTML = "";

            const nextSnap = await getDoc(doc(db, "fixtures", "next"));
            if (nextSnap.exists()) {
                const d = nextSnap.data();
                container.innerHTML += `
                <div class="fixture-box">
                    <div class="fixture-header"><span>NEXT FIXTURE</span></div>
                    <div class="match">
                        <p>${d.date}</p>
                        <p>${d.competition}</p>
                        <div class="teams">
                            <div><img src="${d.team1Logo}" alt="Team 1"><p>${d.team1}</p></div>
                            <div><p>${d.time}</p></div>
                            <div><img src="${d.team2Logo}" alt="Team 2"><p>${d.team2}</p></div>
                        </div>
                    </div>
                </div>`;
            }

            const lastSnap = await getDoc(doc(db, "fixtures", "last"));
            if (lastSnap.exists()) {
                const d = lastSnap.data();
                container.innerHTML += `
                <div class="fixture-box">
                    <div class="fixture-header"><span>LAST RESULT</span></div>
                    <div class="match">
                        <p>${d.date}</p>
                        <p>${d.competition}</p>
                        <div class="teams">
                            <p>${d.team1}</p>
                            <div class="score-box">${d.score1}</div>
                            <div class="score-box">${d.score2}</div>
                            <p>${d.team2}</p>
                        </div>
                    </div>
                </div>`;
            }
        }

        // LOAD ALL
        loadMainPost();
        loadHomepageNews();
        loadFixtures();
    </script>

    <!-- FOOTER -->
    <footer>
        <div style="text-align:center;">
            <img src="images/Logo.png" height="80" alt="Club Logo">
        </div>
        <div class="lang-back">
            <button style="background:#0A1B3F; color:white; border:1px solid white; padding:5px 10px; border-radius:5px; cursor:pointer;">EN</button>
            <a href="#top" style="margin-left:20px; color:white; text-decoration:underline; font-weight:bold;">Back to top ↑</a>
        </div>
        <div class="social-icons" style="text-align:center; margin-bottom:20px;">
            <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
        <div class="copyright">
            Computer Engineering FT Ltd 2025
        </div>
    </footer>
</body>
                                                                                    </html>
