<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPE Sport - Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: red;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    background: white;
    width: 90%;
    max-width: 400px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

/* LOGO */
.logo {
    margin-bottom: 10px;
}

.logo img {
    width: 70px;
}

/* TITLE */
h2 {
    color: red;
    margin-bottom: 10px;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

/* SWITCH */
.switch {
    margin-top: 12px;
    font-size: 14px;
}

.switch span {
    color: red;
    font-weight: bold;
    cursor: pointer;
}

/* MESSAGE */
#message {
    font-size: 13px;
    margin-top: 10px;
    color: red;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="images/Logo.png" alt="CPE Sport">
    </div>

    <h2 id="formTitle">Login</h2>

    <!-- USERNAME (only for signup) -->
    <input type="text" id="username" placeholder="Username" style="display:none;">

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <!-- CONFIRM PASSWORD -->
    <input type="password" id="confirmPassword" placeholder="Confirm Password" style="display:none;">

    <button onclick="handleAuth()">Login</button>

    <div class="switch">
        <span onclick="toggleMode()">Don't have an account? Sign up</span>
    </div>

    <p id="message"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
    getFirestore, 
    setDoc, 
    doc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXEwNI2pRGt5tN_68xhTU7c5McUdz2HL8",
  authDomain: "cpe--football.firebaseapp.com",
  projectId: "cpe--football",
  storageBucket: "cpe--football.firebasestorage.app",
  messagingSenderId: "986780347918",
  appId: "1:986780347918:web:eb427cf5dd652cdae6565f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isLogin = true;

// SWITCH MODE
window.toggleMode = function () {
    isLogin = !isLogin;

    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Sign Up";
    document.querySelector("button").innerText = isLogin ? "Login" : "Sign Up";

    document.getElementById("username").style.display = isLogin ? "none" : "block";
    document.getElementById("confirmPassword").style.display = isLogin ? "none" : "block";

    document.querySelector(".switch span").innerText = isLogin 
        ? "Don't have an account? Sign up" 
        : "Already have an account? Login";
};

// AUTH
window.handleAuth = async function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const username = document.getElementById("username").value;
    const message = document.getElementById("message");

    if (!email || !password) {
        message.innerText = "Fill all required fields";
        return;
    }

    if (!isLogin) {
        // SIGN UP VALIDATION
        if (!username) {
            message.innerText = "Enter username";
            return;
        }

        if (password !== confirmPassword) {
            message.innerText = "Passwords do not match";
            return;
        }
    }

    try {
        if (isLogin) {
            // LOGIN
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "dashboard.html";
        } else {
            // SIGN UP
            const userCred = await createUserWithEmailAndPassword(auth, email, password);

            // SAVE USERNAME IN DATABASE
            await setDoc(doc(db, "users", userCred.user.uid), {
                username: username,
                email: email
            });

            message.innerText = "Account created! Please login.";
        }
    } catch (err) {
        message.innerText = err.message;
    }
};
</script>

</body>
  </html>
